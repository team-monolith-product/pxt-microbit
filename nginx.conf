server {
    listen 4000;
    server_name localhost;

    root /usr/share/nginx/html;

    # Inject instrumentation to capture simulator iframe src bug.
    # Some clients request /simulator instead of /simulator.html (root cause unknown).
    # This captures the call stack via access logs for diagnosis.
    sub_filter '</head>' '<script>
(function(){var o=document.createElement;document.createElement=function(t){var e=o.apply(document,arguments);if(t==="iframe"){var d=Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype,"src");Object.defineProperty(e,"src",{set:function(v){if(v&&/\/simulator(?:[?#]|$)/.test(v)&&!/\.html/.test(v.split(/[?#]/)[0])){navigator.sendBeacon("/__bug_report?t=sim_no_html&src="+encodeURIComponent(v.substring(0,200))+"&cfg="+encodeURIComponent((window.pxtConfig||{}).simUrl||"N/A")+"&web="+encodeURIComponent((window.pxt&&window.pxt.webConfig||{}).simUrl||"N/A")+"&stk="+encodeURIComponent((new Error).stack.substring(0,500)))}d.set.call(this,v)},get:function(){return d.get.call(this)}})}return e}})();
</script></head>';
    sub_filter_once on;
    sub_filter_types text/html;

    location / {
        gzip_static on;
        try_files $uri /index.html;
    }
}
