server {
    listen 4000;
    server_name localhost;

    root /usr/share/nginx/html;

    # Sentry + instrumentation to capture simulator iframe src bug.
    # Some clients request /simulator instead of /simulator.html (root cause unknown).
    # Sentry captures the full call stack with source maps for diagnosis.
    sub_filter '</head>' '
<script src="https://js.sentry-cdn.com/0c8cac44c07684296c74b874d8775d63.min.js" crossorigin="anonymous"></script>
<script>
(function(){var o=document.createElement;document.createElement=function(t){var e=o.apply(document,arguments);if(t==="iframe"){var d=Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype,"src");Object.defineProperty(e,"src",{set:function(v){if(v&&/\/simulator(?:[?#]|$)/.test(v)&&!/\.html/.test(v.split(/[?#]/)[0])){Sentry.captureException(new Error("iframe src missing .html: "+v.substring(0,200)),{extra:{src:v.substring(0,200),pxtConfigSimUrl:(window.pxtConfig||{}).simUrl,webConfigSimUrl:(window.pxt&&window.pxt.webConfig||{}).simUrl}})}d.set.call(this,v)},get:function(){return d.get.call(this)}})}return e}})();
</script>
</head>';
    sub_filter_once on;
    sub_filter_types text/html;

    location / {
        gzip_static on;
        try_files $uri /index.html;
    }
}
